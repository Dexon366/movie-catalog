<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Избранное — Интернет-кинотеатр</title>

    <link rel="stylesheet" href="fonts/fonts.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <div class="logo">🎬 MovieCatalog</div>
            <div class="nav">
                <a href="index.html">Главная</a>
                <a href="favorites.html">Избранное (<span id="favorite-count">0</span>)</a>
                <a href="about.html">О проекте</a>
                <button id="theme-toggle" class="theme-toggle">🌙</button>
            </div>
        </div>

        <h1 class="page-title">❤️ Моё избранное</h1>

        <!-- Сетка избранных фильмов -->
        <div class="movies-grid" id="favorites-grid">
            <!-- Здесь будут карточки избранных фильмов -->
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>

            <div class="modal-layout">
                <!-- Постер слева -->
                <div class="modal-poster">
                    <div id="modal-poster">🎬</div>
                </div>

                <!-- Информация справа -->
                <div class="modal-info">
                    <h2 id="modal-title" class="modal-title"></h2>

                    <div class="modal-meta">
                        <span class="modal-year" id="modal-year"></span>
                        <span class="modal-rating" id="modal-rating"></span>
                    </div>

                    <div class="modal-genre">
                        <strong>Жанр:</strong> <span id="modal-genre"></span>
                    </div>

                    <div class="modal-duration">
                        <strong>Продолжительность:</strong> <span id="modal-duration">—</span>
                    </div>

                    <div class="modal-director">
                        <strong>Режиссёр:</strong> <span id="modal-director">—</span>
                    </div>

                    <div class="modal-description">
                        <strong>Описание:</strong>
                        <p id="modal-description"></p>
                    </div>

                    <div class="modal-actions">
                        <button class="modal-fav-btn" id="modal-fav-btn">❤️ В избранное</button>
                        <button class="modal-trailer-btn" id="modal-trailer-btn">🎬 Смотреть трейлер</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/favorites.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/favorites-page.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
